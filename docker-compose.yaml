version: '3.8' 

services: 
  mysql: 
    image: mysql:latest
    container_name: hospital_management_mysql
    restart: always 
    environment: 
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hospital_management
      MYSQL_USER: hm_user
      MYSQL_PASSWORD: hospital123
    ports: 
      - "3307:3306"
    volumes: 
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
  
volumes: 
    mysql_data: 

